version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - ml-service
    volumes:
      - uploads_data:/app/uploads

  ml-service:
    build: ./ml-service
    container_name: ml-service
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  uploads_data:
